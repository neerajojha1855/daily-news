{% extends 'base.html' %}

{% block content %}
<div class="card auth-card">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <p style="color: #ff4d4f; font-size: 0.9em; margin-bottom: 15px;">Invalid username or password.</p>
        {% endif %}

        <div class="form-group" style="text-align: left;">
            <label for="id_username">Username</label>
            <input type="text" name="username" autofocus="" autocapitalize="none" autocomplete="username"
                maxlength="150" required="" id="id_username">
        </div>
        <div class="form-group" style="text-align: left;">
            <label for="id_password">Password</label>
            <input type="password" name="password" autocomplete="current-password" required="" id="id_password">
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">Login</button>
    </form>
    <p style="margin-top: 20px; font-size: 0.9em;">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary-cyan);">Sign up here</a>.
    </p>
</div>
{% endblock %}
